name: Backend CI

on:
  pull_request:
  push:
    branches:
      - master
      - develop

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --runInBand

      - name: Build
        run: npm run build

  integration-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: booking_system
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 5382
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d booking_system"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: development
      PORT: 3001
      API_PREFIX: /v1
      DATABASE_URL: postgresql://postgres:5382@localhost:5432/booking_system
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      FRONTEND_URLS: http://localhost:3000
      JWT_SECRET: ci-only-secret
      JWT_EXPIRES_IN: 3600
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma migrate deploy
        run: npm run prisma:deploy

      - name: Prisma seed
        run: npm run prisma:seed

      - name: E2E tests
        run: npm run test:e2e -- --runInBand

      - name: Build
        run: npm run build
