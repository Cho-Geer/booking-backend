name: Backend Docker Image

on:
  push:
    branches:
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: docker.io
  IMAGE_NAME: docker.io/cho-geer/booking-backend
  MIGRATION_IMAGE_NAME: docker.io/cho-geer/booking-backend-migration
  LOCAL_TEST_IMAGE: booking-backend:test

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ${{ env.MIGRATION_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build main backend image (and load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.LOCAL_TEST_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          load: true

      - name: Build migration image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.migrate
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Run basic test
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TEST_IMAGE="${{ env.LOCAL_TEST_IMAGE }}"
            echo "Running PR test with local image: $TEST_IMAGE"
          else
            TEST_IMAGE="${{ env.IMAGE_NAME }}:latest"
            echo "Running push test with remote image: $TEST_IMAGE"
          fi
          docker run -d --name backend-test -p 3001:3001 $TEST_IMAGE
          sleep 10
          curl -f http://localhost:3001/v1/health || (docker logs backend-test && exit 1)
          docker stop backend-test
          docker rm backend-test
