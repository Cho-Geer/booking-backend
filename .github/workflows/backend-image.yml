name: Backend Docker Image

on:
  push:
    branches:
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: docker.io
  IMAGE_NAME: docker.io/${{ vars.DOCKER_HUB_USER }}/booking-backend
  MIGRATION_IMAGE_NAME: docker.io/${{ vars.DOCKER_HUB_USER }}/booking-backend-migration
  LOCAL_TEST_IMAGE: booking-backend:test

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for main backend image
        id: meta-main
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Extract metadata for migration image
        id: meta-migration
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MIGRATION_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build main backend image (PR - single platform, load locally)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.LOCAL_TEST_IMAGE }}
          labels: ${{ steps.meta-main.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          load: true

      - name: Build main backend image (Push - multi-platform, push to registry)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-main.outputs.tags }}
          labels: ${{ steps.meta-main.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build migration image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.migrate
          push: true
          tags: ${{ steps.meta-migration.outputs.tags }}
          labels: ${{ steps.meta-migration.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Start test services (PostgreSQL + Redis)
        if: github.event_name == 'pull_request'
        run: |
          docker network create test-network
          docker run -d --name test-postgres \
            --network test-network \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=booking_test \
            -p 5432:5432 \
            postgres:16
          docker run -d --name test-redis \
            --network test-network \
            -p 6379:6379 \
            redis:7-alpine
          sleep 15

      - name: Run basic test (PR - local image with test services)
        if: github.event_name == 'pull_request'
        run: |
          TEST_IMAGE="${{ env.LOCAL_TEST_IMAGE }}"
          echo "Running PR test with local image: $TEST_IMAGE"
          
          docker run -d --name backend-test \
            --network test-network \
            -p 3001:3001 \
            -e DATABASE_URL=postgresql://test:test@test-postgres:5432/booking_test \
            -e REDIS_HOST=test-redis \
            -e REDIS_PORT=6379 \
            -e JWT_SECRET=test-secret-key-for-ci-only \
            -e NODE_ENV=test \
            $TEST_IMAGE
          
          sleep 20
          curl -f http://localhost:3001/v1/health || (docker logs backend-test && exit 1)
          
          docker stop backend-test
          docker rm backend-test
          docker stop test-postgres
          docker rm test-postgres
          docker stop test-redis
          docker rm test-redis
          docker network rm test-network

      - name: Start test services (PostgreSQL + Redis) for Push test
        if: github.event_name != 'pull_request'
        run: |
          docker network create test-network
          docker run -d --name test-postgres \
            --network test-network \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=booking_test \
            -p 5432:5432 \
            postgres:16
          docker run -d --name test-redis \
            --network test-network \
            -p 6379:6379 \
            redis:7-alpine
          sleep 15

      - name: Run basic test (Push - pull remote image with GitHub Secrets)
        if: github.event_name != 'pull_request'
        run: |
          # Extract the first tag from metadata
          FIRST_TAG=$(echo "${{ steps.meta-main.outputs.tags }}" | head -n 1)
          TEST_IMAGE="${FIRST_TAG:-${{ env.IMAGE_NAME }}:latest}"
          echo "Running Push test with remote image: $TEST_IMAGE"
          
          # Pull the single platform (linux/amd64) image for testing
          docker pull --platform linux/amd64 $TEST_IMAGE
          
          # Run the test container with GitHub Secrets
          docker run -d --name backend-test \
            --network test-network \
            -p 3001:3001 \
            --platform linux/amd64 \
            -e DATABASE_URL=${{ secrets.TEST_DATABASE_URL }} \
            -e REDIS_HOST=${{ secrets.TEST_REDIS_HOST }} \
            -e REDIS_PORT=${{ secrets.TEST_REDIS_PORT }} \
            -e JWT_SECRET=${{ secrets.TEST_JWT_SECRET }} \
            -e NODE_ENV=test \
            $TEST_IMAGE
          
          sleep 20
          curl -f http://localhost:3001/v1/health || (docker logs backend-test && exit 1)
          
          docker stop backend-test
          docker rm backend-test
          docker stop test-postgres
          docker rm test-postgres
          docker stop test-redis
          docker rm test-redis
          docker network rm test-network
